<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Simulator Server</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a24; font-family: monospace; }
      #container { width: 100%; height: 100%; }
      #container canvas { display: block; }

      .loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #1a1a24; z-index: 10; transition: opacity 0.3s;
      }
      .loading.hidden { opacity: 0; pointer-events: none; }
      .loading-spinner {
        width: 40px; height: 40px; border: 3px solid #334155;
        border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Connection status indicator */
      #connection-status {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px; border-radius: 6px;
        background: rgba(20, 20, 40, 0.85);
        color: #ccc; font-size: 13px;
      }
      #copy-id-btn {
        background: rgba(255,255,255,0.1); border: none; color: #aaa;
        cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px;
        margin-left: 4px; transition: all 0.15s;
      }
      #copy-id-btn:hover { background: rgba(59,130,246,0.3); color: #fff; }
      #copy-id-btn.copied { background: rgba(34,197,94,0.3); color: #4ade80; }
      #connection-status .dot {
        width: 10px; height: 10px; border-radius: 50%;
      }
      #connection-status .dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
      #connection-status .dot.disconnected { background: #f87171; box-shadow: 0 0 6px #f87171; }

      /* Camera panel */
      #camera-panel {
        position: fixed; bottom: 16px; right: 16px; z-index: 100;
        width: 320px; background: rgba(0, 0, 0, 0.7);
        border-radius: 8px; overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      #camera-panel .title {
        padding: 6px 10px; font-size: 11px; color: #888;
        text-transform: uppercase; letter-spacing: 0.5px;
        background: rgba(0, 0, 0, 0.4);
      }
      #camera-canvas {
        display: block; width: 320px; height: 240px;
      }

      .hint {
        position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
        color: rgba(255,255,255,0.35); font-size: 12px;
        pointer-events: none; z-index: 5;
      }

      .nav-links {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; display: flex; gap: 16px;
      }
      .nav-links a {
        color: rgba(255,255,255,0.5); font-size: 12px;
        text-decoration: none; transition: color 0.2s;
      }
      .nav-links a:hover { color: #3b82f6; }

      /* Command log */
      #cmd-log {
        position: fixed; bottom: 16px; left: 16px; z-index: 100;
        width: 280px; max-height: 200px; overflow-y: auto;
        background: rgba(20, 20, 40, 0.88); border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px; color: #aaa; padding: 8px;
        pointer-events: auto;
      }
      #cmd-log .log-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 4px; padding-bottom: 4px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      #cmd-log .log-title { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
      #cmd-log .log-clear {
        background: none; border: none; color: #666; cursor: pointer; font-size: 10px;
        padding: 1px 4px; border-radius: 3px;
      }
      #cmd-log .log-clear:hover { color: #fff; background: rgba(255,255,255,0.1); }
      #cmd-log .log-entry {
        padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        word-break: break-all;
      }
      #cmd-log .log-entry .ts { color: #555; margin-right: 4px; }
      #cmd-log .log-entry .act { color: #7aa2f7; }
      #cmd-log .log-entry .param { color: #9ece6a; }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
    </div>

    <div id="connection-status">
      <span class="dot disconnected" id="status-dot"></span>
      <span id="status-text">Disconnected</span>
      <button id="copy-id-btn" title="Copy Client ID" style="display:none;">Copy ID</button>
    </div>

    <div class="nav-links">
      <a href="/test-control.html">Test Control</a>
      <a href="/api-docs.html">API Docs</a>
    </div>

    <div id="camera-panel">
      <div class="title">Onboard Camera</div>
      <canvas id="camera-canvas" width="320" height="240"></canvas>
    </div>

    <div class="hint">drag to orbit &bull; scroll to zoom &bull; drag ball/bucket to move</div>

    <div id="cmd-log">
      <div class="log-header">
        <span class="log-title">Command Log</span>
        <button class="log-clear" id="log-clear-btn">clear</button>
      </div>
      <div id="log-entries"></div>
    </div>

    <script type="module" src="/client/main.ts"></script>
  </body>
</html>
