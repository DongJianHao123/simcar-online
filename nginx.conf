# Nginx configuration for car.chenlongrobot.com
# Place this file at: /etc/nginx/sites-available/car-simulator
# Then: ln -s /etc/nginx/sites-available/car-simulator /etc/nginx/sites-enabled/

upstream car_simulator {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name car.chenlongrobot.com;

    # Redirect HTTP to HTTPS (remove this block if you don't have SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name car.chenlongrobot.com;

    # SSL certificates (adjust paths as needed)
    ssl_certificate     /etc/nginx/ssl/car.chenlongrobot.com.pem;
    ssl_certificate_key /etc/nginx/ssl/car.chenlongrobot.com.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static files (served directly by nginx)
    root /path/to/simulator-server/public;
    index index.html;

    # API proxy
    location ^~ /api/ {
        proxy_pass http://car_simulator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location ^~ /socket.io/ {
        proxy_pass http://car_simulator;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # long-lived WS connections
    }

    # SPA / static files fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
