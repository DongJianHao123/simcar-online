server {
    listen 80;
    server_name simcar.chenlongrobot.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name simcar.chenlongrobot.com;

    ssl_certificate     /etc/letsencrypt/live/chenlongrobot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chenlongrobot.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/simcar;
    index index.html;

    # API 代理（精确匹配 /api/，避免拦截 /api-docs.html 等）
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 代理（必须，否则模拟器实时通信失效）
    location ^~ /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # 静态文件 + SPA fallback
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        if ($uri = "/index.html") {
            return 404;
        }
        rewrite ^ /index.html last;
    }
}
